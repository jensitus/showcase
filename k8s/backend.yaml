apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: insurance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/GITHUB_USER/insurance-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/workflow
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: insurance-secrets
                  key: postgres-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insurance-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: insurance-secrets
                  key: jwt-secret
            - name: APP_BASE_URL
              value: https://showcase.service-b.org
            - name: APP_FRONTEND_URL
              value: https://showcase.service-b.org
            - name: CIBSEVEN_BASE_URL
              value: http://engine:7001/engine-rest
            - name: TASKLIST_BASE_URL
              value: http://engine:7001/engine-rest
            - name: WORKFLOW_SERVICE_BASE_URL
              value: http://backend:8080
            - name: SMTP_HOST
              value: smtp-relay.brevo.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_FROM
              value: noreply@showcase.service-b.org
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: insurance-secrets
                  key: smtp-username
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insurance-secrets
                  key: smtp-password
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: insurance
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
