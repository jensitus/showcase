server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # SSE endpoints — disable buffering
    location = /server-send-insurance {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location = /order-status {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # Backend REST API
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     http:// https://;
    }

    # Increase max upload size for BPMN files
    client_max_body_size 10m;

    location /workflows {
        proxy_pass         http://backend:8080/workflows;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     http:// https://;
    }

    location /customers {
        proxy_pass         http://backend:8080/customers;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     http:// https://;
    }

    # CIB Seven engine REST
    location /engine-rest/ {
        proxy_pass         http://engine:7001/engine-rest/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     http:// https://;
    }

    # CIB Seven webapp (cockpit, tasklist, admin)
    location /webapp/ {
        proxy_pass         http://engine:7001/webapp/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     http://engine:7001 https://showcase.service-b.org;
    }

    # Angular SPA fallback
    location / {
        try_files $uri$args $uri$args/ /index.html;
    }
}
