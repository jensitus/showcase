<app-bpmn-definition-viewer
        [processDefinitionKey]="workflowId"
        [tenantId]="'insurance'"
        [version]="5">
</app-bpmn-definition-viewer>
<hr>
<div class="row">
    <div class="col">
        <ul ngbNav #nav="ngbNav" [(activeId)]="active" class="nav-tabs">
            <li [ngbNavItem]="1">
                <button ngbNavLink>Contract Info</button>
                <ng-template ngbNavContent>
                    <p>
                        @for (variable of variables; track variable) {
                            @if (variable.name === 'id') {
                                <app-requested-contracts [aggregateId]="variable.value | slice: 1:37" />
                            }
                        }
                    </p>
                </ng-template>
            </li>
            <li [ngbNavItem]="3">
                <button ngbNavLink>Process Info</button>
                <ng-template ngbNavContent>

                    <h4 class="pt-3">Variables</h4>
                    <div class="row pt-2">
                        <div class="col-md-2">
                            <b>name</b>
                        </div>
                        <div class="col-md-4">
                            <b>value</b>
                        </div>
                        <div class="col-md-2">
                            <b>key</b>
                        </div>
                    </div>
                    @for (variable of variables; track variable) {
                        <div class="row pt-2">

                        </div>
                        <div class="row">
                            <div class="col-md-2">
                                {{ variable.name }}
                            </div>
                            <div class="col-md-4">
                                {{ variable.value }}
                            </div>
                            <div class="col-md-2">
                                {{ variable.key }}
                            </div>
                        </div>
                    }

                </ng-template>
            </li>
        </ul>

        <div [ngbNavOutlet]="nav" class="mt-2"></div>

<!--        <pre>Active: {{ active }}</pre>-->


    </div>
</div>
