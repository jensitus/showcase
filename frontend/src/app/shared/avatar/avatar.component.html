<div [class]="cssClasses()">
    @if (displayUrl() && !showInitials()) {
        <img [src]="displayUrl()"
             [alt]="username() || 'User avatar'"
             class="avatar-img"
             (error)="onImageError()">
    } @else {
        <div class="avatar-initials" [style.background]="backgroundColor()">
            {{ initials() }}
        </div>
    }
</div>
