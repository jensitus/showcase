<div class="avatar" [ngClass]="[sizeClass, shapeClass]">
    <img *ngIf="displayUrl && !showInitials"
         [src]="displayUrl"
         [alt]="username || 'User avatar'"
         class="avatar-img"
         (error)="onImageError()">
    <div *ngIf="!displayUrl || showInitials"
         class="avatar-initials"
         [style.background]="backgroundColor">
        {{ initials }}
    </div>
</div>
