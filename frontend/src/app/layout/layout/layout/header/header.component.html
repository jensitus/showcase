            </span> &nbsp;
            <span>
                service - b . org
            </span>
        </a>
        <button class="navbar-toggler"
                (click)="toggleSidebar()"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <!--span class="navbar-toggler-icon"></--span-->
            <i class="bi bi-list text-warning"></i>
        </button>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            </ul>
            @if (currentUser()) {
                <div class="nav-item">
                    <a [routerLink]="['/profile']" class="text-decoration-none text-dark d-inline-flex align-items-center">
                        <app-avatar [avatarUrl]="currentUser()?.avatarUrl"
                                    [username]="currentUser()?.username"
                                    [email]="currentUser()?.email"
                                    size="sm"
                                    class="me-2">
                        </app-avatar>

                        (click)="languageService.setLanguage('en')">EN</button>
                <button class="btn btn-sm"
                        [class.btn-primary]="languageService.current() === 'de'"
