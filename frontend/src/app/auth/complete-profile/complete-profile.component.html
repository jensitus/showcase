<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="text-center mb-4">
                <i class="bi bi-person-check-fill text-success" style="font-size: 3rem;"></i>
                <h3 class="mt-2">{{ 'AUTH.COMPLETE_PROFILE.TITLE' | translate }}</h3>
                <p class="text-muted">{{ 'AUTH.COMPLETE_PROFILE.SUBTITLE' | translate }}</p>
            </div>

            @if (errorMessage) {
                <div class="alert alert-danger">{{ errorMessage }}</div>
            }

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label for="firstname" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.FIRST_NAME' | translate }}</label>
                            <input id="firstname" type="text" class="form-control" [(ngModel)]="firstname">
                        </div>
                        <div class="col-sm-6">
                            <label for="lastname" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.LAST_NAME' | translate }}</label>
                            <input id="lastname" type="text" class="form-control" [(ngModel)]="lastname">
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label">{{ 'AUTH.COMPLETE_PROFILE.GENDER' | translate }}</label>
                            <select class="form-select" [(ngModel)]="gender">
                                <option value="" disabled>{{ 'AUTH.COMPLETE_PROFILE.SELECT_GENDER' | translate }}</option>
                                @for (g of Gender | keyvalue; track g) {
                                    <option [value]="g.value">{{ g.key }}</option>
                                }
                            </select>
                        </div>

                        <div class="col-sm-6">
                            <label for="dob" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.DATE_OF_BIRTH' | translate }}</label>
                            <div class="input-group">
                                <input
                                    id="dob"
                                    class="form-control"
                                    placeholder="yyyy-mm-dd"
                                    name="dp"
                                    [(ngModel)]="model"
                                    ngbDatepicker
                                    #d="ngbDatepicker"
                                />
                                <button class="btn btn-outline-secondary bi bi-calendar3" (click)="d.toggle()" type="button"></button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="email" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.EMAIL' | translate }}</label>
                            <input id="email" type="email" class="form-control" [(ngModel)]="email" readonly>
                            <div class="form-text">
                                <i class="bi bi-info-circle me-1"></i>{{ 'AUTH.COMPLETE_PROFILE.EMAIL_NOTE' | translate }}
                            </div>
                        </div>

                        <div class="col-sm-6">
                            <label for="phone" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.PHONE' | translate }}</label>
                            <input id="phone" type="tel" class="form-control" [(ngModel)]="phoneNumber">
                        </div>

                        <div class="col-12">
                            <label for="street" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.STREET' | translate }}</label>
                            <input id="street" type="text" class="form-control" [(ngModel)]="street">
                        </div>

                        <div class="col-sm-4">
                            <label for="zip" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.ZIP_CODE' | translate }}</label>
                            <input id="zip" type="text" class="form-control" [(ngModel)]="zipCode">
                        </div>

                        <div class="col-sm-4">
                            <label for="city" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.CITY' | translate }}</label>
                            <input id="city" type="text" class="form-control" [(ngModel)]="city">
                        </div>

                        <div class="col-sm-4">
                            <label for="country" class="form-label">{{ 'AUTH.COMPLETE_PROFILE.COUNTRY' | translate }}</label>
                            <input id="country" type="text" class="form-control" [(ngModel)]="country">
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button class="btn btn-success btn-lg" (click)="save()">
                            <i class="bi bi-check2-circle me-2"></i>{{ 'AUTH.COMPLETE_PROFILE.SAVE' | translate }}
                        </button>
                    </div>
                    <p class="text-muted text-center mt-2 mb-0"><small>{{ 'AUTH.COMPLETE_PROFILE.ALL_REQUIRED' | translate }}</small></p>

                </div>
            </div>

        </div>
    </div>
</div>
