<div class="bpmn-viewer-container">
    @if (loading) {
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading BPMN diagram...</p>
        </div>
    }

    @if (error) {
        <div class="error-state">
            <p>{{ error }}</p>
        </div>
    }

    <div #canvas class="bpmn-canvas"></div>
</div>
