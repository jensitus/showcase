services:

  ## showcase frontend

  postgres: 
    container_name: insurance_showcase
    image: postgres:14.5-alpine
    ports:
      - "5555:5432"
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb/cib.sql:/docker-entrypoint-initdb.d/cib.sql


volumes:
  postgres-data: