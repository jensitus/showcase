databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: system
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: users_pkey
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: users_username_key
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: users_email_key
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: account_non_expired
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: account_non_locked
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: credentials_non_expired
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: USER
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: insert-default-users
      author: system
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: id
                  value: 11111111-1111-1111-1111-111111111111
              - column:
                  name: username
                  value: testuser
              - column:
                  name: email
                  value: testuser@example.com
              - column:
                  name: password
                  value: $2a$10$8EqLCqV2eE9aGVj0bXVzPOLh0xJJ/L1Y6xH8QKzN9Yw4qYl2N3Bde
              - column:
                  name: enabled
                  valueBoolean: true
              - column:
                  name: account_non_expired
                  valueBoolean: true
              - column:
                  name: account_non_locked
                  valueBoolean: true
              - column:
                  name: credentials_non_expired
                  valueBoolean: true
              - column:
                  name: role
                  value: USER
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
        - insert:
            tableName: users
            columns:
              - column:
                  name: id
                  value: 22222222-2222-2222-2222-222222222222
              - column:
                  name: username
                  value: admin
              - column:
                  name: email
                  value: admin@example.com
              - column:
                  name: password
                  value: $2a$10$8EqLCqV2eE9aGVj0bXVzPOLh0xJJ/L1Y6xH8QKzN9Yw4qYl2N3Bde
              - column:
                  name: enabled
                  valueBoolean: true
              - column:
                  name: account_non_expired
                  valueBoolean: true
              - column:
                  name: account_non_locked
                  valueBoolean: true
              - column:
                  name: credentials_non_expired
                  valueBoolean: true
              - column:
                  name: role
                  value: ADMIN
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
  - changeSet:
      author: jensitus
      id: add_first_name_and_last_name_to_users
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: first_name
                  type: VARCHAR(255)
              - column:
                  name: last_name
                  type: VARCHAR(255)
