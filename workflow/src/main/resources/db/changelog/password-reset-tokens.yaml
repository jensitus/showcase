databaseChangeLog:
  - changeSet:
      id: create-password-reset-tokens-table
      author: system
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: password_reset_tokens_pkey
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: password_reset_tokens_token_key
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_tokens_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: create-index-password-reset-tokens-user-id
      author: system
      changes:
        - createIndex:
            indexName: idx_password_reset_tokens_user_id
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_id
