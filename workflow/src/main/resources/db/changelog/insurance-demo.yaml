databaseChangeLog:
  - changeSet:
      id: insurance-entity
      author: jensitus
      changes:
        - createTable:
            tableName: insurance
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: NAME
                  type: varchar(255)
              - column:
                  name: SIMPLE_NAME
                  type: varchar(128)
              - column:
                  name: INSURANCE_TYPE
                  type: int
              - column:
                  name: insurance_number
                  type: int
              - column:
                  name: insurance_coverage
                  type: varchar(128)
              - column:
                  name: insurance_sum
                  type: varchar(128)
              - column:
                  name: payment_schedule
                  type: varchar(128)
              - column:
                  name: amount
                  type: int
              - column:
                  name: state
                  type: varchar(64)
              - column:
                  name: further_information
                  type: varchar(8192)
              - column:
                  name: monthly_income
                  type: int
              - column:
                  name: mudslide_risk
                  type: boolean
              - column:
                  name: flood_risk
                  type: boolean
