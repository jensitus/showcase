databaseChangeLog:
  - changeSet:
      id: update-default-user-passwords
      author: system
      comment: Update default users passwords to correct BCrypt hash for ''
      changes:
        - update:
            tableName: users
            columns:
              - column:
                  name: password
                  value: $2a$10$dXJ3SW6G7P50lGmMkkmwe.20cQQubK3.HZWzG13AX/Xh.jGqhUyLW
            where: username = 'testuser'
        - update:
            tableName: users
            columns:
              - column:
                  name: password
                  value: $2a$10$dXJ3SW6G7P50lGmMkkmwe.20cQQubK3.HZWzG13AX/Xh.jGqhUyLW
            where: username = 'admin'
