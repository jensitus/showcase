spring:
  profiles:
    active: dev
  application:
    name: insurance
  liquibase:
    enabled: true
    change-log: classpath:/db/db.changelog-master.yaml
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          provider_disables_autocommit: true
    show-sql: false
  datasource:
    url: jdbc:postgresql://localhost:5555/workflow
    password: insurance
    username: insurance
    hikari:
      auto-commit: false
  mail:
    host: ${SMTP_HOST:smtp.protonmail.ch}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:info@service-b.org}
    test-connection: true
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long-for-HS256-algorithm-please-change-this-in-production
  expiration: 86400000  # 24 hours in milliseconds

app:
  base-url: http://localhost:8080
  frontend-url: http://localhost:4200

