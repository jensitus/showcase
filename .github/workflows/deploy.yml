name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push engine image
        uses: docker/build-push-action@v5
        with:
          context: ./cibdemo
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/insurance-engine:latest
          cache-from: type=gha,scope=engine
          cache-to: type=gha,mode=max,scope=engine

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./workflow
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/insurance-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/insurance-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "k8s/namespace.yaml,k8s/engine.yaml,k8s/backend.yaml,k8s/frontend.yaml,k8s/ingress.yaml,k8s/engine-ingress.yaml,k8s/postgres.yaml"
          target: /opt/insurance/
          strip_components: 0

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            OWNER="${{ github.repository_owner }}"

            # Replace placeholder with actual GitHub owner in manifests
            sed -i "s/GITHUB_USER/${OWNER}/g" /opt/insurance/k8s/*.yaml

            # Apply infra manifests (idempotent)
            kubectl apply -f /opt/insurance/k8s/namespace.yaml
            kubectl apply -f /opt/insurance/k8s/postgres.yaml

            # Apply app deployments
            kubectl apply -f /opt/insurance/k8s/engine.yaml
            kubectl apply -f /opt/insurance/k8s/backend.yaml
            kubectl apply -f /opt/insurance/k8s/frontend.yaml
            kubectl apply -f /opt/insurance/k8s/ingress.yaml
            kubectl apply -f /opt/insurance/k8s/engine-ingress.yaml

            # Force rollout so new :latest images are pulled
            kubectl rollout restart deployment/engine -n insurance
            kubectl rollout restart deployment/backend -n insurance
            kubectl rollout restart deployment/frontend -n insurance

            # Wait for rollout
            kubectl rollout status deployment/backend -n insurance --timeout=300s
            kubectl rollout status deployment/frontend -n insurance --timeout=120s

            echo "Deployment complete."
